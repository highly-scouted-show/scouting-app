<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> The Highly Scouted Show</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #11192B;
    --surface: #111318;
    --surface2: #181c22;
    --border: #1e232d;
    --border2: #262c38;
    --text: #e8edf5;
    --muted: #6b7385;
    --dim: #3a3f4d;
    --accent: #1eac2c;
    --accent-dim: #062206;
    --pink: #FC0AF9;
    --green: #3ecf6e;
    --green-dim: #0d2a1a;
    --red: #e05555;
    --red-dim: #2a0e0e;
    --blue: #5b9ef5;
    --blue-dim: #0d1e35;
  }

.grade-badge {
  padding: 2px 6px;
  border-radius: 2px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  display: inline-block;
  min-width: 44px;
  text-align: center;
  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}


/* color tiers */
.grade-topten {
  background: #f810cd;
  color: #ffffff;
}

.grade-round1 {
  background: #09f6fa;
  color: #ffffff;
}

.grade-round1-2 {
  background: #2662d9;
  color: #fcfcfc;
}

.grade-top50 {
  background: #33b72a;
  color: #ffffff;
}

.grade-round2 {
  background: #abdf30;
  color: #f6f6f6;
}

/* ── GRID LAYOUT ── */

#main-table {
  width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
}

/* column widths */
#main-table th:nth-child(1),
#main-table td:nth-child(1) {
  width: 50px;
}

#main-table th:nth-child(2),
#main-table td:nth-child(2) {
  width: 220px;
  text-align: left;
}

#main-table th:nth-child(3),
#main-table td:nth-child(3) {
  width: 80px;
}

/* center everything else */
#main-table th:nth-child(n+3),
#main-table td:nth-child(n+3) {
  text-align: center;
}

/* header styling */
#main-table thead th {
  text-align: center;
}

#main-table thead th:nth-child(2) {
  text-align: left;
}

/* player text */
.player-name,
.player-school {
  text-align: left;
}

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo-block h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 32px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
  }
  .logo-block h1 span { color: var(--accent); }
  .logo-block p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }
  .header-meta { color: var(--muted); font-size: 12px; text-align: right; }
  .header-meta strong { color: var(--text); }

  #main-table td {
  text-align: center;
}

#main-table td:nth-child(1),
#main-table td:nth-child(2) {
  text-align: left;
}

  /* ── Filters ── */
  .filters {
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .pill {
  background: #fff;
  border: 1px solid #000;
  border-radius: 3px;
  color: #000;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 4px 10px;
  transition: all 0.12s;
  white-space: nowrap;
  }

  .pill:hover {
  border-color: #000;
  background: #f2f2f2;
  color: #000;
  }

  .pill.active {
  background: #000;
  border-color: #000;
  color: #fff;
  }

  .search-input {
  background: #fff;
  border: 1px solid #000;
  color: #000;
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  outline: none;
  padding: 5px 10px;
  transition: border-color 0.12s;
  width: 180px;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder {
  color: #777;
  }

  /* ── Table ── */
  .table-wrap { padding: 0 32px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface);
    border-bottom: 2px solid var(--border2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 10px 10px;
    text-align: left;
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
  }

  .table-wrap {
  padding: 0;
  overflow: auto;
  flex: 1;
}

#main-table thead th {
  position: sticky;
  top: 0;
  z-index: 5;
}

#main-table thead th {
  box-shadow: 0 2px 2px rgba(0,0,0,0.05);
}

  .board-wrap thead th {
  background: #151616;
  color: #ffffff;
  border-bottom: 1px solid #000000;
  }

  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: ' ▲'; color: var(--accent); font-size: 9px; }
  thead th.sort-desc::after { content: ' ▼'; color: var(--accent); font-size: 9px; }
  thead th.no-sort { cursor: default; }
  thead th.no-sort:hover { color: var(--muted); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .board-wrap tbody tr:hover {
  background: #f2f6ff;
}
  tbody tr.expanded { background: #f5f6f8; }
  tbody td { padding: 10px 10px; vertical-align: top; font-variant-numeric: tabular-nums; }

  .td-rank { color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; width: 36px; }

  .board-wrap {
  background: #ffffff;
  margin: 0 32px 40px;
  border-radius: 6px;
  border: 1px solid #e6e6e6;

  /* KEY ADDITIONS */
  max-height: 70vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.board-wrap table {
  color: #111;
}

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: color 0.1s;
  }
  .player-name:hover { color: var(--accent); }
  .player-school { color: var(--muted); font-size: 11px; margin-top: 1px; }

  
  .pos-badge {
    background: #fff;
    border: 1px solid #000;
    border-radius: 2px;
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 6px;
  }
  

  .round-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  
  .round-badge {
  background: #fff;
  border: 1px solid #000;
  color: #000;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 1px 4px;
  margin-left: 4px;
  vertical-align: middle;
  }
  

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .metric { font-size: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; }
  .metric-null { color: var(--dim); }

  /* Notes expand row */
  .notes-row td {
    padding: 0;
    border-bottom: 2px solid var(--accent);
  }
  .notes-inner {
    padding: 14px 20px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    animation: slideDown 0.18s ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .notes-block h4 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .notes-block.strengths h4 { color: var(--green); }
  .notes-block.weaknesses h4 { color: var(--red); }
  .notes-block.notes h4 { color: var(--accent); }
  .notes-block p { color: #a0a8bc; font-size: 12px; line-height: 1.6; }
  .notes-block ul { color: #a0a8bc; font-size: 12px; line-height: 1.7; padding-left: 14px; }
  .notes-block.strengths li::marker { color: var(--green); }
  .notes-block.weaknesses li::marker { color: var(--red); }

  .expand-btn {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    transition: color 0.1s;
  }
  .expand-btn:hover { color: var(--accent); }
  .expand-btn.open { color: var(--accent); transform: rotate(90deg); }

  /* Hidden rows */
  .notes-row { display: none; }
  .notes-row.visible { display: table-row; }

  /* notes bar */
  .notes-bar {
    padding: 10px 32px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .notes-bar strong { color: var(--text); }

  /* Empty state */
  .empty-row td {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-style: italic;
  }

  @media (max-width: 767px) {
    header { padding: 16px; }
    .filters { padding: 10px 16px; }
    .table-wrap { padding: 0 0 32px; }
    .notes-inner { grid-template-columns: 1fr; }
    .notes-bar { padding: 8px 16px; }
  }
</style>
</head>

</div>

</div>

<div class="board-wrap">

   <tbody id="tbody"></tbody>
  </table>
</div>
</div>

// ── STATE ──────────────────────────────────────────────────────────────────────
const filters = { pos: 'all' };
let searchQuery = '';
let sortCol = null;
let sortDir = 'asc';
let expandedId = null;

// ── HELPERS ────────────────────────────────────────────────────────────────────
function fmtHt(inches) {
  if (inches == null) return '—';
  return `${Math.floor(inches / 12)}'${inches % 12}"`;
}

function gradeClass(grade) {
  const g = Number(grade);

  if (g >= 9.0) return "grade-topten";
  if (g >= 8.5) return "grade-round1";
  if (g >= 8.0) return "grade-round1-2";
  if (g >= 7.7) return "grade-top50";
  if (g >= 7.4) return "grade-round2";
  if (g >= 7.0) return "grade-round3";
  return "grade-depth";
}

function sortKey(p, col) {
  if (col === 'name')  return p.name.toLowerCase();
  if (col === 'pos')   return p.pos;
  if (col === 'grade') return p.grade;
  if (col === 'value') return p.value();
  if (col === 'ht')    return p.ht ?? -1;
  if (col === 'wt')    return p.wt ?? -1;
  return 0;
}

function passes(p) {
  const posOk = filters.pos === 'all' || p.pos === filters.pos;
  const q = searchQuery.toLowerCase();
  const searchOk =
    !q ||
    p.name.toLowerCase().includes(q) ||
    (p.school || '').toLowerCase().includes(q);

  return posOk && searchOk;
}

function gradeLabel(p) {
  const g = Number(p.grade).toFixed(2);
  const cls = gradeClass(p.grade);

  return `<span class="grade-badge ${cls}">${g}</span>`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  let data = PROSPECTS.filter(passes);

  if (sortCol) {
    data.sort((a, b) => {
      const ka = sortKey(a, sortCol), kb = sortKey(b, sortCol);
      if (ka < kb) return sortDir === 'asc' ? -1 : 1;
      if (ka > kb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  document.getElementById('notes-text').innerHTML =
    `<strong>${data.length}</strong> of ${PROSPECTS.length} prospects`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (data.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No prospects match your filters.</td></tr>';
    return;
  }

  data.forEach((p, i) => {
    const isOpen = expandedId === p.id;

    // Main row
    const tr = document.createElement('tr');
    if (isOpen) tr.classList.add('expanded');
    tr.innerHTML = `
  <td class="td-rank">${i + 1}</td>

  <td>
    <div class="player-name" data-id="${p.id}">${p.name}</div>
    <div class="player-school">${p.school}</div>
  </td>

  <td><span class="pos-badge">${p.pos}</span></td>

  <td>${p.posRank || '—'}</td>

  <td>${gradeLabel(p)}</td>

  <td><span class="value">${p.value || '<span style="color:#3a3f4d">—</span>'}</span></td>

  <td><span class="metric">${p.age || '—'}</span></td>

  <td><span class="metric">${fmtHt(p.ht)}</span></td>

  <td><span class="metric">${p.wt != null ? p.wt + ' lbs' : '—'}</span></td>

  <td>
    <button class="expand-btn ${isOpen ? 'open' : ''}" data-id="${p.id}" title="Toggle notes">▶</button>
  </td>
`;
    tbody.appendChild(tr);

    // Notes row
    const ntr = document.createElement('tr');
    ntr.classList.add('notes-row');
    if (isOpen) ntr.classList.add('visible');

    const strengthsHtml = (p.strengths || []).map(s => `<li>${s}</li>`).join('');
    const weaknessesHtml = (p.weaknesses || []).map(w => `<li>${w}</li>`).join('');
    const notesHtml = p.notes || '<span style="color:#4a5060">No notes recorded.</span>';

    ntr.innerHTML = `<td colspan="8">
      <div class="notes-inner">
        <div class="notes-block strengths">
          <h4>Strengths</h4>
          <ul>${strengthsHtml || '<li style="color:#3a3f4d">None listed</li>'}</ul>
        </div>
        <div class="notes-block weaknesses">
          <h4>Weaknesses</h4>
          <ul>${weaknessesHtml || '<li style="color:#3a3f4d">None listed</li>'}</ul>
        </div>
        <div class="notes-block notes">
          <h4>Scout Notes</h4>
          <p>${notesHtml}</p>
        </div>
      </div>
    </td>`;
    tbody.appendChild(ntr);
  });

  // Event delegation for expand buttons and player names
  tbody.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      expandedId = expandedId === id ? null : id;
      render();
    });
  });

  // Column sort headers
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
}

// ── WIRE CONTROLS ─────────────────────────────────────────────────────────────
document.querySelectorAll('.pill[data-filter]').forEach(pill => {
  pill.addEventListener('click', () => {
    const type = pill.dataset.filter;
    document.querySelectorAll(`.pill[data-filter="${type}"]`).forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    filters[type] = pill.dataset.value;
    expandedId = null;
    render();
  });
});

document.getElementById('player-search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  expandedId = null;
  render();
});

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    render();
  });
});

render();
</script>
