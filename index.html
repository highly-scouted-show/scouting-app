<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> The Highly Scouted Show</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #11192B;
    --surface: #111318;
    --surface2: #181c22;
    --border: #1e232d;
    --border2: #262c38;
    --text: #e8edf5;
    --muted: #6b7385;
    --dim: #3a3f4d;
    --accent: #d4a843;
    --accent-dim: #2a2010;
    --green: #3ecf6e;
    --green-dim: #0d2a1a;
    --red: #e05555;
    --red-dim: #2a0e0e;
    --blue: #5b9ef5;
    --blue-dim: #0d1e35;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo-block h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 32px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
  }
  .logo-block h1 span { color: var(--accent); }
  .logo-block p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }
  .header-meta { color: var(--muted); font-size: 12px; text-align: right; }
  .header-meta strong { color: var(--text); }

  /* ── Filters ── */
  .filters {
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 4px 10px;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    outline: none;
    padding: 5px 10px;
    transition: border-color 0.12s;
    width: 180px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--dim); }

  /* ── Table ── */
  .table-wrap { padding: 0 32px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface);
    border-bottom: 2px solid var(--border2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 10px 10px;
    text-align: left;
    text-transform: uppercase;
    white-space: nowrap;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: ' ▲'; color: var(--accent); font-size: 9px; }
  thead th.sort-desc::after { content: ' ▼'; color: var(--accent); font-size: 9px; }
  thead th.no-sort { cursor: default; }
  thead th.no-sort:hover { color: var(--muted); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: #14171d; }
  tbody tr.expanded { background: #12151b; }
  tbody td { padding: 10px 10px; vertical-align: top; font-variant-numeric: tabular-nums; }

  .td-rank { color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; width: 36px; }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: color 0.1s;
  }
  .player-name:hover { color: var(--accent); }
  .player-school { color: var(--muted); font-size: 11px; margin-top: 1px; }

  .pos-badge {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 2px;
    color: #8899bb;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 6px;
  }

  .round-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .round-badge {
    background: #1a1506;
    border: 1px solid #3a2e10;
    border-radius: 2px;
    color: #8a7030;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .metric { font-size: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; }
  .metric-null { color: var(--dim); }

  /* Notes expand row */
  .notes-row td {
    padding: 0;
    border-bottom: 2px solid var(--accent);
  }
  .notes-inner {
    padding: 14px 20px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    animation: slideDown 0.18s ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .notes-block h4 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .notes-block.strengths h4 { color: var(--green); }
  .notes-block.weaknesses h4 { color: var(--red); }
  .notes-block.notes h4 { color: var(--accent); }
  .notes-block p { color: #a0a8bc; font-size: 12px; line-height: 1.6; }
  .notes-block ul { color: #a0a8bc; font-size: 12px; line-height: 1.7; padding-left: 14px; }
  .notes-block.strengths li::marker { color: var(--green); }
  .notes-block.weaknesses li::marker { color: var(--red); }

  .expand-btn {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    transition: color 0.1s;
  }
  .expand-btn:hover { color: var(--accent); }
  .expand-btn.open { color: var(--accent); transform: rotate(90deg); }

  /* Hidden rows */
  .notes-row { display: none; }
  .notes-row.visible { display: table-row; }

  /* notes bar */
  .notes-bar {
    padding: 10px 32px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .notes-bar strong { color: var(--text); }

  /* Empty state */
  .empty-row td {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-style: italic;
  }

  @media (max-width: 767px) {
    header { padding: 16px; }
    .filters { padding: 10px 16px; }
    .table-wrap { padding: 0 0 32px; }
    .notes-inner { grid-template-columns: 1fr; }
    .notes-bar { padding: 8px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>NFL <span>Draft</span> Scout</h1>
    <p>2026 Prospect Rankings</p>
  </div>
  <div class="header-meta">
    Click any player name to view<br>strengths, weaknesses &amp; notes
  </div>
</header>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Pos</span>
    <button class="pill active" data-filter="pos" data-value="all">All</button>
    <button class="pill" data-filter="pos" data-value="QB">QB</button>
    <button class="pill" data-filter="pos" data-value="RB">RB</button>
    <button class="pill" data-filter="pos" data-value="WR">WR</button>
    <button class="pill" data-filter="pos" data-value="TE">TE</button>
    <button class="pill" data-filter="pos" data-value="OT">OT</button>
    <button class="pill" data-filter="pos" data-value="OG">OG</button>
    <button class="pill" data-filter="pos" data-value="C">C</button>
    <button class="pill" data-filter="pos" data-value="EDGE">EDGE</button>
    <button class="pill" data-filter="pos" data-value="DT">DT</button>
    <button class="pill" data-filter="pos" data-value="LB">LB</button>
    <button class="pill" data-filter="pos" data-value="CB">CB</button>
    <button class="pill" data-filter="pos" data-value="S">S</button>
  </div>

  <div class="filter-group">
    <span class="filter-label">Search</span>
    <input class="search-input" id="player-search" placeholder="Player or school...">
  </div>
</div>

<div class="notes-bar">
  <span id="notes-text">Loading...</span>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th class="no-sort">#</th>
        <th data-col="name">Player</th>
        <th data-col="pos">Pos</th>
        <th data-col="grade">Grade</th>
        <th data-col="value">Value</th>
        <th data-col="con">Con></th>
        <th data-col="ht">Ht</th>
        <th data-col="wt">Wt</th>
        <th class="no-sort">Notes</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
// Edit this array to add your own prospects.
// draft_round: 1-7, or null for UDFA
// draft_pick: pick number within the round (optional)
// round_proj: true = projected (pre-draft), false = actual
// ht: height in inches (e.g. 74 = 6'2")
// wt: weight in lbs
// strengths/weaknesses: arrays of bullet strings
// notes: free text scouting note

const PROSPECTS = [
  {
    id: 1,
    name: "Jeremiyah Love",
    school: "Notre Dame",
    pos: "RB",
    grade: "9.20",
    value: "Top 10"
    ht: 72, wt: 212,

    weaknesses: ["Lighter frame could potentially lead to injuries at the next level", "Not a great pass blocker, will definitely struggle with this aspect of the game at the next level"],
    notes: "Top-rated QB in a weak class. High ceiling but will need a stable offensive system around him early. Titans coaching staff believes he's NFL-ready Day 1."
  },
  {
    id: 2,
    name: "Travis Hunter",
    school: "Colorado",
    pos: "CB",
    team: "Cleveland Browns",
    draft_round: 1, draft_pick: 2, round_proj: false,
    ht: 72, wt: 185,
    strengths: ["Two-way threat — elite CB and WR at college level", "Elite ball skills and contested catch ability", "Explosive twitch and recovery speed"],
    weaknesses: ["NFL teams must decide: CB or WR?", "Size concerns versus bigger NFL receivers", "Durability questions over a full 17-game season"],
    notes: "Arguably the most unique prospect in years. The Browns selected him as a CB with WR packages. Historic combine measurables at his position."
  },
  {
    id: 3,
    name: "Abdul Carter",
    school: "Penn State",
    pos: "EDGE",
    team: "New York Giants",
    draft_round: 1, draft_pick: 3, round_proj: false,
    ht: 75, wt: 247,
    strengths: ["Relentless motor and elite get-off", "Advanced pass-rush plan with multiple counters", "Versatile — can rush from multiple alignments"],
    weaknesses: ["Run defense needs refinement vs. bigger guards", "Pad level inconsistency in college film", "Limited sample at true EDGE (moved from LB)"],
    notes: "Giants desperately needed a pass rusher and got the best one in the draft. His upside is a perennial Pro Bowler if the run-defense details are cleaned up."
  },
  {
    id: 4,
    name: "Will Campbell",
    school: "LSU",
    pos: "OT",
    team: "New England Patriots",
    draft_round: 1, draft_pick: 4, round_proj: false,
    ht: 78, wt: 314,
    strengths: ["Exceptional footwork and balance for the position", "Polished pass-set technique, rarely overextends", "Handles speed-to-power well against elite edge rushers"],
    weaknesses: ["Arm length slightly below ideal NFL threshold", "Needs to add functional strength in run game", "Limited against true bull-rush specialists"],
    notes: "Patriots rebuild their OL around a lineman who was the most technically sound in the class. Long-term franchise LT if arm-length concerns prove unfounded."
  },
  {
    id: 5,
    name: "Ashton Jeanty",
    school: "Boise State",
    pos: "RB",
    team: "Las Vegas Raiders",
    draft_round: 1, draft_pick: 6, round_proj: false,
    ht: 69, wt: 214,
    strengths: ["Heisman-caliber vision and burst through the hole", "Exceptional contact balance — rarely goes down first contact", "Legitimate receiving threat out of the backfield"],
    weaknesses: ["Competition level concerns from Mountain West", "Compact frame limits ability to absorb 300+ carry seasons", "Pass protection technique is raw"],
    notes: "Best RB prospect since Saquon Barkley in terms of tape dominance. The Heisman race wasn't close. Raiders get a potential franchise RB."
  },
  {
    id: 6,
    name: "Mason Graham",
    school: "Michigan",
    pos: "DT",
    team: "Cleveland Browns",
    draft_round: 1, draft_pick: 5, round_proj: false,
    ht: 75, wt: 315,
    strengths: ["Explosive first step for his size", "Excellent hand technique — swim and rip moves", "High-motor player, consistent effort in run defense"],
    weaknesses: ["Sack production understated vs. elite interior rushers", "Gets washed out in long-yardage run situations at times", "NFL trajectory: dominant vs. run, average vs. pass?"],
    notes: "Arguably the safest pick in the top 10. Pure nose tackle/3-tech who was unblockable in Big Ten play. Floor is starter, ceiling is Pro Bowl."
  },
  {
    id: 7,
    name: "Luther Burden III",
    school: "Missouri",
    pos: "WR",
    team: "Chicago Bears",
    draft_round: 1, draft_pick: 10, round_proj: false,
    ht: 71, wt: 208,
    strengths: ["Elite short-area quickness and YAC ability", "Polished route runner with NFL-ready releases", "Reliable hands in contested-catch situations"],
    weaknesses: ["Doesn't have elite top-end speed (4.52 40)", "Scheme fit matters — best in spacing offenses", "Production dipped in 2025 with QB instability"],
    notes: "The most NFL-ready WR in the class despite not being the most athletic. Caleb Williams gets a legitimate weapon in Chicago's rebuild."
  },
  {
    id: 8,
    name: "Kelvin Banks Jr.",
    school: "Texas",
    pos: "OT",
    team: "New York Jets",
    draft_round: 1, draft_pick: 7, round_proj: false,
    ht: 77, wt: 314,
    strengths: ["Outstanding anchor strength against power rushers", "Smart and assignment-sound — rarely beaten twice", "Three-year starter at elite competition level"],
    weaknesses: ["Lateral agility is a question mark vs. speed edge rushers", "Can get top-heavy in space on screen plays", "Needs to win more consistently with hands inside"],
    notes: "Jets needed O-line help desperately. Banks is a safe, high-floor LT who likely develops into a 10-year starter. Won't wow you but won't beat you either."
  },
  {
    id: 9,
    name: "Tetairoa McMillan",
    school: "Arizona",
    pos: "WR",
    team: "Carolina Panthers",
    draft_round: 1, draft_pick: 8, round_proj: false,
    ht: 76, wt: 219,
    strengths: ["Elite size-speed combination (6'4\", sub-4.4)", "Dominant in the red zone and on contested catches", "Advanced footwork in route running for his size"],
    weaknesses: ["Separation ability against press corners is inconsistent", "Needs improvement in the intermediate route tree", "Limited YAC despite measurables"],
    notes: "The Panthers finally add a legitimate WR1 target for Bryce Young. McMillan's ceiling is Josh Gordon-level if he refines his route running."
  },
  {
    id: 10,
    name: "Shedeur Sanders",
    school: "Colorado",
    pos: "QB",
    team: "Cleveland Browns",
    draft_round: 1, draft_pick: 12, round_proj: false,
    ht: 73, wt: 215,
    strengths: ["Elite pocket management and pressure performance", "High-accuracy thrower — 74.0% completion rate in 2025", "Strong leadership presence and football IQ"],
    weaknesses: ["Arm strength is average for an NFL starter", "Operating behind a historically bad OL inflated 'pressure' stats", "Proving he can perform without father/coaching staff nearby"],
    notes: "Slid further than most expected on draft night. Browns land a potential franchise QB at a great value pick. High floor, debated ceiling."
  },
  {
    id: 11,
    name: "Mykel Williams",
    school: "Georgia",
    pos: "EDGE",
    team: "San Francisco 49ers",
    draft_round: 1, draft_pick: 11, round_proj: false,
    ht: 77, wt: 260,
    strengths: ["Elite athleticism — rare speed-power combo at 260 lbs", "High-upside pass rusher with great length", "Scheme versatile — can play 3-4 or 4-3 EDGE"],
    weaknesses: ["Pass-rush plan is underdeveloped — too reliant on athleticism", "Production didn't always match physical tools in college", "Needs NFL coaching to maximize technique"],
    notes: "49ers stay aggressive adding a potential star pass rusher. Williams is more of a projection than Carter/Graham but the upside is sky-high. Kyle Shanahan loves upside."
  },
  {
    id: 12,
    name: "Emeka Egbuka",
    school: "Ohio State",
    pos: "WR",
    team: "Tampa Bay Buccaneers",
    draft_round: 1, draft_pick: 19, round_proj: false,
    ht: 72, wt: 205,
    strengths: ["Crisp, precise route runner — elite timing with QBs", "Versatile — can play in the slot or outside", "Strong hands, reliable in traffic"],
    weaknesses: ["Lacks elite separation speed at the top of routes", "Not a significant YAC threat after the catch", "Overshadowed by receiver depth at Ohio State for two seasons"],
    notes: "Baker Mayfield gets a polished, reliable target. Egbuka is the definition of a pro's pro — won't blow up the stat sheet Week 1 but will be a 1,000-yard receiver by Year 2."
  }
];

// ── STATE ──────────────────────────────────────────────────────────────────────
const filters = { pos: 'all' };
let searchQuery = '';
let sortCol = null;
let sortDir = 'asc';
let expandedId = null;

// ── HELPERS ────────────────────────────────────────────────────────────────────
function fmtHt(inches) {
  if (inches == null) return '—';
  return `${Math.floor(inches / 12)}'${inches % 12}"`;
}

function sortKey(p, col) {
  if (col === 'name')  return p.name.toLowerCase();
  if (col === 'pos')   return p.pos;
  if (col === 'grade') return p.grade;
  if (col === 'value') return p.value();
  if (col === 'ht')    return p.ht ?? -1;
  if (col === 'wt')    return p.wt ?? -1;
  return 0;
}

function passes(p) {
  const posOk = filters.pos === 'all' || p.pos === filters.pos;
  const q = searchQuery.toLowerCase();
  const searchOk = !q || p.name.toLowerCase().includes(q) || (p.school || '').toLowerCase().includes(q);
  return posOk && roundOk && searchOk;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  let data = PROSPECTS.filter(passes);

  if (sortCol) {
    data.sort((a, b) => {
      const ka = sortKey(a, sortCol), kb = sortKey(b, sortCol);
      if (ka < kb) return sortDir === 'asc' ? -1 : 1;
      if (ka > kb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  document.getElementById('notes-text').innerHTML =
    `<strong>${data.length}</strong> of ${PROSPECTS.length} prospects`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (data.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No prospects match your filters.</td></tr>';
    return;
  }

  data.forEach((p, i) => {
    const isOpen = expandedId === p.id;

    // Main row
    const tr = document.createElement('tr');
    if (isOpen) tr.classList.add('expanded');
    tr.innerHTML = `
      <td class="td-rank">${i + 1}</td>
      <td>
        <div class="player-name" data-id="${p.id}">${p.name}</div>
        <div class="player-school">${p.school}</div>
      </td>
      <td><span class="pos-badge">${p.pos}</span></td>
      <td>${gradeLabel(p)}</td>
      <td><span class="value">${p.team || '<span style="color:#3a3f4d">—</span>'}</span></td>
      <td><span class="metric">${fmtHt(p.ht)}</span></td>
      <td><span class="metric">${p.wt != null ? p.wt + ' lbs' : '<span class="metric-null">—</span>'}</span></td>
      <td><button class="expand-btn ${isOpen ? 'open' : ''}" data-id="${p.id}" title="Toggle notes">▶</button></td>
    `;
    tbody.appendChild(tr);

    // Notes row
    const ntr = document.createElement('tr');
    ntr.classList.add('notes-row');
    if (isOpen) ntr.classList.add('visible');

    const strengthsHtml = (p.strengths || []).map(s => `<li>${s}</li>`).join('');
    const weaknessesHtml = (p.weaknesses || []).map(w => `<li>${w}</li>`).join('');
    const notesHtml = p.notes || '<span style="color:#4a5060">No notes recorded.</span>';

    ntr.innerHTML = `<td colspan="8">
      <div class="notes-inner">
        <div class="notes-block strengths">
          <h4>Strengths</h4>
          <ul>${strengthsHtml || '<li style="color:#3a3f4d">None listed</li>'}</ul>
        </div>
        <div class="notes-block weaknesses">
          <h4>Weaknesses</h4>
          <ul>${weaknessesHtml || '<li style="color:#3a3f4d">None listed</li>'}</ul>
        </div>
        <div class="notes-block notes">
          <h4>Scout Notes</h4>
          <p>${notesHtml}</p>
        </div>
      </div>
    </td>`;
    tbody.appendChild(ntr);
  });

  // Event delegation for expand buttons and player names
  tbody.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      expandedId = expandedId === id ? null : id;
      render();
    });
  });

  // Column sort headers
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
}

// ── WIRE CONTROLS ─────────────────────────────────────────────────────────────
document.querySelectorAll('.pill[data-filter]').forEach(pill => {
  pill.addEventListener('click', () => {
    const type = pill.dataset.filter;
    document.querySelectorAll(`.pill[data-filter="${type}"]`).forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    filters[type] = pill.dataset.value;
    expandedId = null;
    render();
  });
});

document.getElementById('player-search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  expandedId = null;
  render();
});

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    render();
  });
});

render();
</script>
</body>
</html>
